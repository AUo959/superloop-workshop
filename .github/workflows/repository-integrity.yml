name: Repository integrity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate repository structure and internal links
        run: python tools/check_repository.py

      - name: Run E001 invariant tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -p "test_*.py" -v
